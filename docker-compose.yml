services:
  backend:
    build: ./backend
    platform: linux/amd64
    working_dir: /app
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,backend,ianronk.nl
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}
    ports:
      - "8001:8001"
    networks:
      - default
      - dokploy-network
    command: >
      sh -c "
        until python -c \"
import os, psycopg
try:
    psycopg.connect(host=os.environ['POSTGRES_HOST'], port=os.environ.get('POSTGRES_PORT','5432'), dbname=os.environ['POSTGRES_DB'], user=os.environ['POSTGRES_USER'], password=os.environ['POSTGRES_PASSWORD'], connect_timeout=3)
    print('DB ready')
except Exception as e:
    print('DB not ready:', e)
    exit(1)
\" 2>&1; do
          echo 'Waiting for database...';
          sleep 5;
        done &&
        python manage.py migrate &&
        gunicorn --bind 0.0.0.0:8001 config.wsgi:application"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8001), 3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build: ./frontend
    platform: linux/amd64
    environment:
      - DJANGO_API_URL=http://backend:8001
      - MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3001
    ports:
      - "3001:3001"
    networks:
      - default
      - dokploy-network
    depends_on:
      backend:
        condition: service_healthy

networks:
  dokploy-network:
    external: true
