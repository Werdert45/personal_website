services:
  backend:
    build: ./backend
    platform: linux/amd64
    working_dir: /app
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,backend,ianronk.nl
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}
    ports:
      - "8001:8001"
    command: >
      sh -c "python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8001 config.wsgi:application"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8001), 3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build: ./frontend
    platform: linux/amd64
    environment:
      - DJANGO_API_URL=http://backend:8001
      - MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy
